  { key: "EI", pos: "E", neg: "I", posName: "외향", negName: "내향", cat: "에너지·데이트 리듬" },
  { key: "SN", pos: "S", neg: "N", posName: "현실", negName: "상상", cat: "대화·세계관" },
  { key: "TF", pos: "T", neg: "F", posName: "이성", negName: "감성", cat: "마음 표현·갈등 해결" },
  { key: "JP", pos: "J", neg: "P", posName: "계획", negName: "즉흥", cat: "라이프스타일" },
];
function lettersOf(scores) {
  return AXES.map(a => (scores[a.key] >= 0 ? a.pos : a.neg)).join("");
}
function strengthPct(v) { return Math.max(52, Math.min(96, Math.round(50 + Math.abs(v) * 1.4))); }

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function copyText(text, done) {
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();

      <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.6 }}>{T.love}</div>
      {scores && (
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginTop: 10 }}>
          {AXES.map(ax => {
            const v = scores[ax.key];
            const letter = v >= 0 ? ax.pos : ax.neg;
            return <Chip key={ax.key} bg="#ffffffB3" color={accent}>{letter} {strengthPct(v)}%</Chip>;
          })}
        </div>
      )}
    </div>
  );
}

function LoveFit() {
  const [invite, setInvite] = useState(null);   // 초대 페이로드 {n, t, s}
  const [coupleView, setCoupleView] = useState(null); // 결과 공유 링크 {a:{n,t,s}, b:{n,t,s}}
  const [mode, setMode] = useState("home");     // home | name | quiz | result | couple
  const [phase, setPhase] = useState("quiz");   // quiz | rest
  const [myName, setMyName] = useState("");
  const [nameDraft, setNameDraft] = useState("");
  const [stage, setStage] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState(Array(12).fill(null));
  const [posLog, setPosLog] = useState(Array(12).fill(null));
  const [sceneMs, setSceneMs] = useState(Array(12).fill(null));
  const [qStart, setQStart] = useState(Date.now());
  const [seed, setSeed] = useState(() => Math.floor(Math.random() * 100000));
  const [copied, setCopied] = useState("");

  useEffect(() => {
    const h = location.hash;
    if (h.startsWith("#invite=")) { const p = dec(h.slice(8)); if (p && p.t && TYPES[p.t]) setInvite(p); }
    else if (h.startsWith("#couple=")) { const p = dec(h.slice(8)); if (p && p.a && p.b && TYPES[p.a.t] && TYPES[p.b.t]) { setCoupleView(p); setMode("couple"); } }
  }, []);

  const activeStory = useMemo(() => {
    const seen = loadSeen();
    return STORY_POOL.map((slot, i) => {
      const seenList = seen[i] || [];
      const fresh = slot.map((_, vi) => vi).filter(vi => !seenList.includes(vi));
      const pick = fresh.length ? fresh[(seed + i * 7) % fresh.length] : (seed + i * 7) % slot.length;
      return { ...slot[pick], _v: pick };
    });
  }, [seed]);
  const orders = useMemo(() => activeStory.map((sc, i) => seededShuffle([...sc.options.keys()], seed * 13 + i + 1)), [activeStory, seed]);

  const scores = useMemo(() => {
    const s = { EI: 0, SN: 0, TF: 0, JP: 0 };
    activeStory.forEach((sc, i) => {
      const a = answers[i];
      if (a == null) return;
      Object.entries(sc.options[a].eff).forEach(([k, v]) => { s[k] += v; });
    });
    return s;
  }, [answers, activeStory]);
  const myType = lettersOf(scores);
  const allDone = answers.every(a => a != null);

  const reliability = useMemo(() => {
    if (!allDone) return null;
    const counts = {};
    posLog.forEach(p => { if (p != null) counts[p] = (counts[p] || 0) + 1; });
    const maxSame = Math.max(0, ...Object.values(counts));
    const times = sceneMs.filter(t => t != null).sort((a, b) => a - b);
    const median = times.length ? times[Math.floor(times.length / 2)] : 99999;
    const flags = [];
    if (maxSame >= 10) flags.push("같은 위치 반복");
    if (median < 1400) flags.push("응답 속도 과다");
    return { level: flags.length === 0 ? "높음" : flags.length === 1 ? "보통" : "확인 필요", flags };
  }, [allDone, posLog, sceneMs]);

  const resetTest = () => {
    setStage(0); setPhase("quiz"); setQIdx(0);
    setAnswers(Array(12).fill(null)); setPosLog(Array(12).fill(null)); setSceneMs(Array(12).fill(null));
    setSeed(Math.floor(Math.random() * 100000)); setQStart(Date.now());
  };
  const startTest = () => { resetTest(); setMode("name"); setNameDraft(""); };

  const shell = { minHeight: "100vh", background: C.bg, fontFamily: font, color: C.ink, display: "flex", flexDirection: "column", alignItems: "center" };
  const card = { background: C.paper, border: `1px solid ${C.line}`, borderRadius: 18, padding: 20 };
  const btn = (bg, color = "#fff") => ({ background: bg, color, border: "none", borderRadius: 13, padding: "13px 24px", fontSize: 15, fontWeight: 800, cursor: "pointer", fontFamily: font });

  const css = `
    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(-28px,20px) scale(1.15)} 100%{transform:translate(0,0) scale(1)} }
    @keyframes drift2 { 0%{transform:translate(0,0) scale(1)} 50%{transform:translate(36px,-22px) scale(1.2)} 100%{transform:translate(0,0) scale(1)} }
    @keyframes popIn { 0%{opacity:0; transform:translateY(14px)} 100%{opacity:1; transform:translateY(0)} }
    @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(232,68,122,.55)} 50%{box-shadow:0 0 0 14px rgba(232,68,122,0)} }
    @keyframes wobble { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
    @keyframes beat { 0%,100%{transform:scale(1)} 12%{transform:scale(1.18)} 24%{transform:scale(1)} 36%{transform:scale(1.12)} 48%{transform:scale(1)} }
    .pop{animation:popIn .45s ease both} .pop2{animation:popIn .45s .12s ease both} .pop3{animation:popIn .45s .24s ease both}
    .glow{animation:pulseGlow 2.2s infinite} .wob{animation:wobble 2.4s ease-in-out infinite} .beat{animation:beat 1.6s ease-in-out infinite}
    @media (prefers-reduced-motion: reduce){ *{animation:none !important} }
  `;

  const Header = (
    <div style={{ width: "100%", maxWidth: 780, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "18px 20px 6px", flexWrap: "wrap", gap: 8 }}>

        </span>

  const copyBtn = (key, text, label, bg) => (

  // ================= 홈 =================
  if (mode === "home") {

    return (

            <div style={{ position: "absolute", left: -80, bottom: -60, width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(108,92,232,.55), transparent 65%)", animation: "drift2 11s ease-in-out infinite", filter: "blur(8px)" }} />
            <div style={{ position: "relative" }}>
              {invitedBy ? (
                <div className="pop" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,.12)", border: "1px solid rgba(255,255,255,.22)", borderRadius: 999, padding: "8px 16px", fontSize: 13.5, fontWeight: 800 }}>
                  💌 <b style={{ color: "#FFB0CB" }}>{invitedBy.n}</b>님이 궁합 테스트에 초대했어요
                </div>
              ) : (
                <div className="pop" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(255,255,255,.1)", border: "1px solid rgba(255,255,255,.18)", borderRadius: 999, padding: "7px 16px", fontSize: 13, fontWeight: 800 }}>
                  💘 이번 주 <span style={{ color: C.gold }}>{WEEKLY_DONE}쌍</span>이 궁합을 확인했어요
                </div>

              <h1 className="pop2" style={{ margin: "24px 0 12px", lineHeight: 1.08, letterSpacing: -2.2 }}>
                <span style={{ display: "block", fontSize: "clamp(40px, 8vw, 66px)", fontWeight: 900, background: "linear-gradient(90deg, #FF8FB1, #FFC2D6)", WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>연애는 스토리,</span>

              <div className="pop3" style={{ display: "flex", gap: 3, marginBottom: 20, fontSize: 24, flexWrap: "wrap" }}>
                {Object.values(TYPES).slice(0, 12).map((t, i) => <span key={i} title={t.name}>{t.emoji}</span>)}

              {invitedBy && (
                <div className="pop3" style={{ display: "flex", alignItems: "center", gap: 12, background: "rgba(255,255,255,.08)", border: "1px solid rgba(255,255,255,.16)", borderRadius: 16, padding: "12px 16px", marginBottom: 20, maxWidth: 460 }}>
                  <span className="wob" style={{ fontSize: 44, filter: "blur(6px)", display: "inline-block" }}>{TYPES[invitedBy.t].emoji}</span>
                  <div style={{ fontSize: 13, lineHeight: 1.6, color: "#E4D8E2" }}>
                    <b style={{ color: "#fff" }}>{invitedBy.n}</b>님의 유형은 이미 도착해 있어요.<br />

              <div className="pop3" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 26 }}>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(210px, 1fr))", gap: 12, marginTop: 14 }}>

            <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.7, flex: "1 1 300px" }}>

            <input value={nameDraft} onChange={e => setNameDraft(e.target.value)} maxLength={10} placeholder="예) 시철, 자기야, 곰돌이"

              </div>
              <div>
                <button style={{ ...btn(next.color), fontSize: 16, padding: "14px 34px" }}
                  onClick={() => { setStage(stage + 1); setPhase("quiz"); setQIdx(0); setQStart(Date.now()); }}>

      setQStart(Date.now());

      else if (stage < 2) setPhase("rest");
      else { markSeen(activeStory); setMode("result"); }
    };
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 600, padding: "14px 20px 60px" }}>

              </div>
            ))}

          <div className="pop" style={{ ...card }} key={`${stage}-${qIdx}`}>

              <div style={{ position: "relative", borderRadius: 16, overflow: "hidden", padding: "30px 0", textAlign: "center", background: `linear-gradient(135deg, ${qu.grad[0]}, ${qu.grad[1]})` }}>

                <div style={{ position: "absolute", right: -26, bottom: -46, width: 130, height: 130, borderRadius: "50%", background: "rgba(0,0,0,.08)" }} />

            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {orders[gIdx].map((origIdx, di) => {
                const op = qu.options[origIdx];

                  <button key={op.label} onClick={() => {
                    const na = [...answers]; na[gIdx] = origIdx; setAnswers(na);
                    const np = [...posLog]; np[gIdx] = di; setPosLog(np);

                  }} style={{ textAlign: "left", padding: "13px 16px", borderRadius: 13, cursor: "pointer", fontFamily: font, fontSize: 14.5, lineHeight: 1.55, fontWeight: on ? 800 : 600, border: `1.5px solid ${on ? st.color : C.line}`, background: on ? st.soft : C.paper, color: on ? st.color : C.ink }}>

          <div style={{ display: "flex", justifyContent: "flex-start", marginTop: 14 }}>
            <button disabled={qIdx === 0} onClick={() => setQIdx(qIdx - 1)}
              style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}`, opacity: qIdx === 0 ? 0.4 : 1, padding: "10px 18px", fontSize: 13.5 }}>이전 장면</button>
          </div>
        </div>
      </div>

  }

  // ================= 결과 =================
  const mePayload = { n: myName, t: myType, s: scores };

  if (mode === "result" && !invite) {
    const T = TYPES[myType];
    const inviteLink = `${baseUrl()}#invite=${enc(mePayload)}`;
    const shareMsg = `💘 러브핏 궁합 테스트\n\n나(${myName})의 연애 유형이 나왔어!\n너도 90초 스토리 테스트하면 우리 궁합이 바로 나와 👇\n${inviteLink}`;
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 780, padding: "14px 20px 60px" }}>
          <div className="pop" style={{ borderRadius: 22, padding: "30px 26px", color: "#fff", marginBottom: 14, position: "relative", overflow: "hidden", background: "linear-gradient(135deg, #1C0F1E, #33152B)" }}>
            <div style={{ position: "absolute", right: -50, top: -50, width: 260, height: 260, borderRadius: "50%", background: "radial-gradient(circle, rgba(232,68,122,.45), transparent 65%)" }} />
            <div style={{ position: "relative", display: "flex", gap: 22, flexWrap: "wrap", alignItems: "center" }}>
              <div className="beat" style={{ fontSize: 92, lineHeight: 1 }}>{T.emoji}</div>
              <div style={{ flex: "1 1 280px" }}>
                <div style={{ fontSize: 12.5, fontWeight: 800, color: C.gold }}>{myName}님의 연애 유형</div>
                <div style={{ fontSize: 30, fontWeight: 900, margin: "4px 0 2px" }}>{myType} <span style={{ fontSize: 17, fontWeight: 700, color: "#D9C6D6" }}>— {T.name}</span></div>
                <div style={{ fontSize: 14.5, fontStyle: "italic", color: "#FFB0CB", margin: "6px 0 10px" }}>{T.line}</div>
                <p style={{ fontSize: 13.5, color: "#D6C7D3", lineHeight: 1.7, margin: "0 0 12px" }}>{T.love}</p>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
                  {AXES.map(ax => {
                    const v = scores[ax.key];
                    return <Chip key={ax.key} bg="rgba(255,255,255,.14)" color="#FFE0EC">{v >= 0 ? ax.pos : ax.neg} · {v >= 0 ? ax.posName : ax.negName} {strengthPct(v)}%</Chip>;
                  })}
                </div>
                <Chip bg="rgba(108,92,232,.3)" color="#CFC6FF">💜 이론상 찰떡 · {T.best.map(b => `${TYPES[b].emoji}${b}`).join("  ")}</Chip>
                {reliability && (
                  <div style={{ marginTop: 10 }}>
                    <Chip bg="rgba(255,255,255,.14)" color={reliability.level === "높음" ? "#7EDBB4" : "#FFE0A8"}>응답 신뢰도 · {reliability.level}{reliability.flags.length ? ` (${reliability.flags.join(" · ")})` : ""}</Chip>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="pop2" style={{ ...card, textAlign: "center", padding: "28px 24px", marginBottom: 14, border: `2px dashed ${C.me}66`, background: "#FFFBFC" }}>
            <div className="beat" style={{ fontSize: 40, display: "inline-block" }}>💌</div>
            <div style={{ fontSize: 19, fontWeight: 900, margin: "8px 0 6px" }}>이제 반쪽의 이야기가 필요해요</div>
            <p style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.7, margin: "0 0 16px" }}>
              아래 버튼으로 링크를 복사해 연인에게 보내세요.<br />
              상대가 같은 사계절 이야기를 끝내는 순간, <b style={{ color: C.me }}>둘의 궁합 리포트</b>가 완성됩니다.
            </p>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              {copyBtn("invite", shareMsg, "💘 초대 메시지 복사하기 (카톡용)", C.me)}
              {copyBtn("link", inviteLink, "🔗 링크만 복사", "#3D2A3A")}
            </div>
            <div style={{ fontSize: 11, color: "#B7A6AE", marginTop: 12 }}>* 링크에는 이름과 유형 결과만 담깁니다. 개별 답변 내용은 전송되지 않습니다.</div>
          </div>

          <div className="pop3" style={{ ...card }}>
            <div style={{ fontSize: 12.5, fontWeight: 800, color: C.you, marginBottom: 12 }}>나의 4축 상세</div>
            {AXES.map(ax => <AxisCompare key={ax.key} axis={ax} a={scores[ax.key]} b={null} nameA={myName} nameB="" />)}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
              <button onClick={() => { resetTest(); setMode("quiz"); }} style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}`, padding: "8px 16px", fontSize: 12.5 }}>다른 장면으로 다시 검사</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ================= 커플 결과 (초대받은 사람 완료 or 공유 링크 열람) =================
  if (mode === "result" && invite || mode === "couple") {
    const A = mode === "couple" ? coupleView.a : invite;         // 초대한 사람 (핑크)
    const B = mode === "couple" ? coupleView.b : mePayload;      // 응답한 사람 (퍼플)
    const rep = coupleReport(A.t, B.t);
    const grade = totalLabel(rep.total);
    const coupleLink = `${baseUrl()}#couple=${enc({ a: { n: A.n, t: A.t, s: A.s }, b: { n: B.n, t: B.t, s: B.s } })}`;
    const shareMsg = `💞 러브핏 궁합 결과\n\n${A.n}(${A.t}) ❤ ${B.n}(${B.t})\n궁합 ${rep.total}점 · ${grade.word}!\n\n전체 리포트 보기 👇\n${coupleLink}`;
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 780, padding: "14px 20px 60px" }}>
          <div className="pop" style={{ borderRadius: 22, padding: "32px 26px", color: "#fff", marginBottom: 14, position: "relative", overflow: "hidden", background: "linear-gradient(135deg, #1C0F1E, #2A1533, #14162E)" }}>
            <div style={{ position: "absolute", right: -50, top: -60, width: 280, height: 280, borderRadius: "50%", background: "radial-gradient(circle, rgba(232,68,122,.45), transparent 65%)" }} />
            <div style={{ position: "absolute", left: -60, bottom: -70, width: 260, height: 260, borderRadius: "50%", background: "radial-gradient(circle, rgba(108,92,232,.5), transparent 65%)" }} />
            <div style={{ position: "relative", textAlign: "center" }}>
              <div style={{ fontSize: 12.5, fontWeight: 800, color: C.gold, marginBottom: 12 }}>💞 우리의 궁합 리포트{rep.golden ? " · ✨ 이론상 천생연분 조합" : ""}</div>
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: "clamp(10px, 4vw, 28px)", flexWrap: "wrap" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 62, lineHeight: 1 }}>{TYPES[A.t].emoji}</div>
                  <div style={{ fontSize: 16, fontWeight: 900, marginTop: 6 }}>{A.n}</div>
                  <div style={{ fontSize: 12.5, fontWeight: 800, color: "#FFB0CB" }}>{A.t} · {TYPES[A.t].name}</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div className="beat" style={{ fontSize: 34, display: "inline-block" }}>❤️</div>
                  <div style={{ fontSize: "clamp(46px, 9vw, 64px)", fontWeight: 900, lineHeight: 1, background: "linear-gradient(90deg, #FF8FB1, #CFC6FF)", WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>{rep.total}</div>
                  <div style={{ fontSize: 14, fontWeight: 900, color: "#FFE0EC", marginTop: 2 }}>{grade.g}등급 · {grade.word}</div>
                  <div style={{ fontSize: 11.5, color: "#B9A6B6", marginTop: 2 }}>{grade.desc}</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 62, lineHeight: 1 }}>{TYPES[B.t].emoji}</div>
                  <div style={{ fontSize: 16, fontWeight: 900, marginTop: 6 }}>{B.n}</div>
                  <div style={{ fontSize: 12.5, fontWeight: 800, color: "#CFC6FF" }}>{B.t} · {TYPES[B.t].name}</div>
                </div>
              </div>
            </div>
          </div>

          <div className="pop2" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 14 }}>
            <TypeCard name={A.n} type={A.t} scores={A.s} accent={C.me} soft={C.meSoft} roleLabel="💗 먼저 검사한 사람" />
            <TypeCard name={B.n} type={B.t} scores={B.s} accent={C.you} soft={C.youSoft} roleLabel="💜 초대받은 사람" />
          </div>

          <div className="pop2" style={{ ...card, marginBottom: 14 }}>
            <div style={{ fontSize: 12.5, fontWeight: 800, color: C.me, marginBottom: 14 }}>4축 겹쳐보기 <span style={{ fontWeight: 700, color: C.sub }}>· <span style={{ color: C.me }}>●</span> {A.n} <span style={{ color: C.you }}>●</span> {B.n}</span></div>
            {AXES.map(ax => <AxisCompare key={ax.key} axis={ax} a={(A.s || {})[ax.key] ?? ((A.t.includes(ax.pos) ? 20 : -20))} b={(B.s || {})[ax.key] ?? ((B.t.includes(ax.pos) ? 20 : -20))} nameA={A.n} nameB={B.n} />)}
            <div style={{ fontSize: 11, color: "#B7A6AE" }}>* 점이 가까울수록 같은 성향, 멀수록 보완 관계입니다. 같음도 다름도 각각의 강점이 있어요.</div>
          </div>

          <div className="pop3" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 12, marginBottom: 14 }}>
            {rep.cats.map(cat => (
              <div key={cat.name} style={{ ...card, padding: 18 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontSize: 14.5, fontWeight: 900 }}>{cat.icon} {cat.name}</span>
                  <span style={{ fontSize: 15, fontWeight: 900, color: scoreColor(cat.score / cat.max * 100) }}>{cat.score}<span style={{ fontSize: 11.5, color: "#C9B8BF" }}> / {cat.max}</span></span>
                </div>
                <div style={{ height: 7, background: "#F7EEF0", borderRadius: 99, overflow: "hidden", marginBottom: 10 }}>
                  <div style={{ width: `${(cat.score / cat.max) * 100}%`, height: "100%", background: `linear-gradient(90deg, ${C.me}, ${C.you})`, borderRadius: 99 }} />
                </div>
                <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.7 }}>{cat.text}</div>
              </div>
            ))}
          </div>

          <div className="pop3" style={{ ...card, marginBottom: 14, background: "#FFFBFC", border: `1.5px solid ${C.me}33` }}>
            <div style={{ fontSize: 13.5, fontWeight: 900, marginBottom: 10 }}>💡 두 사람을 위한 처방전</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {rep.tips.map((t, i) => (
                <div key={i} style={{ display: "flex", gap: 10, fontSize: 13, color: C.sub, lineHeight: 1.7 }}>
                  <span style={{ fontWeight: 900, color: C.me }}>{String(i + 1).padStart(2, "0")}</span>
                  <span>{t}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="pop3" style={{ ...card, textAlign: "center" }}>
            <div style={{ fontSize: 15, fontWeight: 900, marginBottom: 12 }}>이 결과, 함께 봐야 진짜죠</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              {copyBtn("couple", shareMsg, "💞 결과 메시지 복사하기 (카톡용)", C.me)}
              {copyBtn("clink", coupleLink, "🔗 결과 링크만 복사", "#3D2A3A")}
              <button onClick={() => { location.hash = ""; setInvite(null); setCoupleView(null); startTest(); }} style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}` }}>나도 처음부터 해보기</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LoveFit />);
</script>
</body>
</html>
