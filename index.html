  { key: "EI", pos: "E", neg: "I", posName: "외향", negName: "내향", cat: "에너지·데이트 리듬" },
  { key: "SN", pos: "S", neg: "N", posName: "현실", negName: "상상", cat: "대화·세계관" },
  { key: "TF", pos: "T", neg: "F", posName: "이성", negName: "감성", cat: "마음 표현·갈등 해결" },
  { key: "JP", pos: "J", neg: "P", posName: "계획", negName: "즉흥", cat: "라이프스타일" },
];
function lettersOf(scores) {
  return AXES.map(a => (scores[a.key] >= 0 ? a.pos : a.neg)).join("");
}
function strengthPct(v) { return Math.max(52, Math.min(96, Math.round(50 + Math.abs(v) * 1.4))); }

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function copyText(text, done) {

// ---------- 결과 화면 하트 레인 연출 ----------
function HeartRain({ n = 10 }) {
  const em = ["💗", "💜", "❤️", "💕", "✨"];
  return (
    <div style={{ position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden" }}>
      {Array.from({ length: n }).map((_, i) => (
        <span key={i} style={{ position: "absolute", left: `${(i * 37 + 7) % 96}%`, top: -26, fontSize: 13 + (i % 3) * 7, opacity: 0.55, animation: `fall ${4.5 + (i % 4)}s linear ${(i * 0.8) % 4}s infinite` }}>{em[i % em.length]}</span>
      ))}
    </div>
  );
}

// ---------- 점수 카운트업 (0 → 총점, easeOutCubic) ----------
function CountUp({ to, duration = 1800, style, onDone }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let reduced = false;
    try { reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}
    if (reduced) { setVal(to); if (onDone) onDone(); return; }
    let raf; const t0 = performance.now();
    const tick = now => {
      const p = Math.min(1, (now - t0) / duration);
      const e = 1 - Math.pow(1 - p, 3); // easeOutCubic — 막판에 감속하며 긴장감
      setVal(Math.round(to * e));
      if (p < 1) raf = requestAnimationFrame(tick);
      else if (onDone) onDone();
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [to]);
  return <span style={style}>{val}</span>;
}

function totalLabel(t) {
  if (t >= 92) return { g: "S", word: "운명의 상성", desc: "이론상 천생연분 구간" };
  if (t >= 84) return { g: "A", word: "찰떡 케미", desc: "노력 대비 효율 최고의 조합" };
  if (t >= 74) return { g: "B", word: "성장형 케미", desc: "맞춰갈수록 단단해지는 조합" };
  return { g: "C", word: "번역기 필수 케미", desc: "다름이 큰 만큼 배울 것도 큰 조합" };

        </div>
      </div>

      <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.6 }}>{T.love}</div>
      {scores && (
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginTop: 10 }}>
          {AXES.map(ax => {
            const v = scores[ax.key];
            const letter = v >= 0 ? ax.pos : ax.neg;
            return <Chip key={ax.key} bg="#ffffffB3" color={accent}>{letter} {strengthPct(v)}%</Chip>;
          })}
        </div>
      )}
    </div>
  );
}

function LoveFit() {
  const [invite, setInvite] = useState(null);   // 초대 페이로드 {n, t, s}
  const [coupleView, setCoupleView] = useState(null); // 결과 공유 링크 {a:{n,t,s}, b:{n,t,s}}
  const [mode, setMode] = useState("home");     // home | name | quiz | result | couple
  const [phase, setPhase] = useState("quiz");   // quiz | rest
  const [myName, setMyName] = useState("");
  const [nameDraft, setNameDraft] = useState("");
  const [stage, setStage] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState(Array(12).fill(null));
  const [posLog, setPosLog] = useState(Array(12).fill(null));
  const [sceneMs, setSceneMs] = useState(Array(12).fill(null));
  const [qStart, setQStart] = useState(Date.now());
  const [seed, setSeed] = useState(() => Math.floor(Math.random() * 100000));
  const [bonus, setBonus] = useState(null); // 적응형 보완 문항 { list, idx, answers } — 유효 응답 부족 축 즉석 보강
  const [copied, setCopied] = useState("");
  const [sfxOn, setSfxOn] = useState(() => sfxEnabled());
  const [customName, setCustomName] = useState(false);

  useEffect(() => {
    const h = location.hash;
    if (h.startsWith("#invite=")) { const p = dec(h.slice(8)); if (p && p.t && TYPES[p.t]) setInvite(p); }
    else if (h.startsWith("#couple=")) { const p = dec(h.slice(8)); if (p && p.a && p.b && TYPES[p.a.t] && TYPES[p.b.t]) { setCoupleView(p); setMode("couple"); } }
  }, []);

  const activeStory = useMemo(() => {
    const seen = loadSeen();
    return STORY_POOL.map((slot, i) => {
      const seenList = seen[i] || [];
      const fresh = slot.map((_, vi) => vi).filter(vi => !seenList.includes(vi));
      const pick = fresh.length ? fresh[(seed + i * 7) % fresh.length] : (seed + i * 7) % slot.length;
      return { ...slot[pick], _v: pick };
    });
  }, [seed]);
  const orders = useMemo(() => activeStory.map((sc, i) => seededShuffle([...sc.options.keys()], seed * 13 + i + 1)), [activeStory, seed]);

  const scores = useMemo(() => {
    const s = { EI: 0, SN: 0, TF: 0, JP: 0 };
    activeStory.forEach((sc, i) => {
      const a = answers[i];
      if (a == null || a === "skip") return;
      Object.entries(sc.options[a].eff).forEach(([k, v]) => { s[k] += v; });
    });
    if (bonus) bonus.list.forEach((sc, i) => {
      const a = bonus.answers[i];
      if (a == null) return;
      Object.entries(sc.options[a].eff).forEach(([k, v]) => { s[k] += v; });
    });
    return s;
  }, [answers, activeStory, bonus]);
  const myType = lettersOf(scores);
  const allDone = answers.every(a => a != null);

  const reliability = useMemo(() => {
    if (!allDone) return null;
    const counts = {};
    posLog.forEach(p => { if (p != null) counts[p] = (counts[p] || 0) + 1; });
    const maxSame = Math.max(0, ...Object.values(counts));
    const times = sceneMs.filter(t => t != null).sort((a, b) => a - b);
    const median = times.length ? times[Math.floor(times.length / 2)] : 99999;
    const flags = [];
    if (maxSame >= 10) flags.push("같은 위치 반복");
    if (median < 1400) flags.push("응답 속도 과다");
    const skips = answers.filter(a => a === "skip").length;
    if (skips >= 4) flags.push(`판단 보류 ${skips}회`);
    return { level: flags.length === 0 ? "높음" : flags.length === 1 ? "보통" : "확인 필요", flags };
  }, [allDone, posLog, sceneMs, answers]);

  // 축별 메타: 유효 응답 수 + 경계선(균형형) 여부 — 49% vs 51% 강제 분류의 완충 장치

    AXES.forEach(ax => {

      const effective = slots.filter(i => answers[i] != null && answers[i] !== "skip").length;
      const bonusEff = bonus ? bonus.list.filter((sc, i) => sc._axis === ax.key && bonus.answers[i] != null).length : 0;
      m[ax.key] = { effective: effective + bonusEff, borderline: Math.abs(scores[ax.key]) < 6 };
    });
    return m;

  const resetTest = () => {

              <div style={{ margin: "2px 0 12px" }}>
                <div style={{ position: "relative", borderRadius: 16, overflow: "hidden", padding: "30px 0", textAlign: "center", background: `linear-gradient(135deg, ${bq.grad[0]}, ${bq.grad[1]})` }}>
                  <div style={{ position: "absolute", left: -34, top: -34, width: 150, height: 150, borderRadius: "50%", background: "rgba(255,255,255,.24)" }} />
                  <div className="wob" style={{ fontSize: 82, lineHeight: 1, position: "relative", display: "inline-block", filter: "drop-shadow(0 6px 12px rgba(0,0,0,.16))" }}>{bq.scene}</div>
                </div>
                <div style={{ fontSize: 13.5, fontWeight: 800, color: C.you, marginTop: 10, textAlign: "center" }}>{bq.title}</div>
              </div>
              <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.75, marginBottom: 18, whiteSpace: "pre-line" }}>{bq.text}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {bq.options.map((op, oi) => (
                  <button key={op.label} onClick={() => {
                    sfx("pick"); const na = [...bonus.answers]; na[bonus.idx] = oi;
                    if (bonus.idx < bonus.list.length - 1) { setBonus({ ...bonus, answers: na, idx: bonus.idx + 1 }); setQStart(Date.now()); }
                    else { setBonus({ ...bonus, answers: na }); markSeen(activeStory); sfx(invite ? "love" : "result"); setTimeout(() => setMode("result"), 200); }
                  }} style={{ textAlign: "left", padding: "13px 16px", borderRadius: 13, cursor: "pointer", fontFamily: font, fontSize: 14.5, lineHeight: 1.55, fontWeight: 600, border: `1.5px solid ${C.line}`, background: C.paper, color: C.ink }}>
                    {op.label}
                  </button>
                ))}
                <div style={{ fontSize: 10.5, color: "#C4AEB6", textAlign: "center" }}>보완 장면은 정확도를 위한 추가 측정이라 판단 보류 없이 진행돼요.</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    if (phase === "rest") {
      const next = STAGES[stage + 1];
      const teaser = TYPES[myType];
      const blurPx = stage === 0 ? 8 : 4;
      return (
        <div style={shell}>
          <style>{css}</style>
          {Header}
          <div style={{ width: "100%", maxWidth: 540, padding: "36px 20px 60px" }}>
            <div className="pop" style={{ ...card, textAlign: "center", padding: "34px 24px" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: st.color, marginBottom: 12 }}>{stage + 1}부 완료 ✓</div>
              <div className="wob" style={{ fontSize: 72, filter: `blur(${blurPx}px)`, display: "inline-block", marginBottom: 6 }}>{teaser.emoji}</div>
              <div style={{ fontSize: 19, fontWeight: 900, marginBottom: 4 }}>
                {myName}님, 지금까지의 선택은 <span style={{ color: C.me }}>{myType[0]}?{myType[2]}?</span> 쪽이에요
              </div>
              <p style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.7, margin: "0 0 16px" }}>
                하지만 아직 확정이 아닙니다 — {stage === 0 ? "여름의 선택이 방향을 바꿀 수 있어요." : "겨울, 갈등의 계절이 진짜 성향을 드러냅니다."}
              </p>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: next.soft, borderRadius: 12, padding: "10px 16px", marginBottom: 18 }}>
                <span style={{ fontSize: 12.5, fontWeight: 800, color: next.color }}>다음 · {stage + 2}부 {next.name}</span>
                <span style={{ fontSize: 12, color: C.sub }}>4장면 · 약 30초</span>
              </div>
              <div>
                <button style={{ ...btn(next.color), fontSize: 16, padding: "14px 34px" }}
                  onClick={() => { setStage(stage + 1); setPhase("quiz"); setQIdx(0); setQStart(Date.now()); }}>
                  계속하기 →
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const qu = items[qIdx];
    const gIdx = stage * 4 + qIdx;
    const advance = (ansNow) => {
      setQStart(Date.now());
      if (qIdx < 3) { setQIdx(qIdx + 1); return; }
      if (stage < 2) { sfx("stage"); setPhase("rest"); return; }
      // [적응형 보완] 12장면 종료 — 판단 보류가 몰려 유효 응답 ≤1인 축은 안 본 변형에서 최대 2장면 즉석 출제
      const ans = ansNow || answers;
      const weak = AXES.map(a => a.key).filter(k => {
        const slots = SLOT_AXIS.map((sk, si) => (sk === k ? si : -1)).filter(si => si >= 0);
        return slots.filter(si => ans[si] != null && ans[si] !== "skip").length <= 1;
      });
      if (weak.length && !bonus) {
        const list = [];
        weak.forEach(k => {
          SLOT_AXIS.forEach((sk, si) => {
            if (sk !== k) return;
            STORY_POOL[si].forEach((v, vi) => {
              if (vi !== activeStory[si]._v && list.filter(x => x._axis === k).length < 2) list.push({ ...v, _axis: k });
            });
          });
        });
        if (list.length) { sfx("stage"); setBonus({ list, idx: 0, answers: Array(list.length).fill(null) }); setPhase("bonus"); return; }
      }
      markSeen(activeStory); sfx(invite ? "love" : "result"); setMode("result");
    };
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 600, padding: "14px 20px 60px" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            {STAGES.map((s, i) => (
              <div key={s.name} style={{ flex: 1, textAlign: "center" }}>
                <div style={{ height: 6, borderRadius: 99, background: i < stage ? s.color : i === stage ? s.soft : "#F1E7E9", overflow: "hidden" }}>
                  {i === stage && <div style={{ width: `${(stageAnswered / 4) * 100}%`, height: "100%", background: s.color, transition: "width .25s" }} />}
                </div>
                <div style={{ fontSize: 10.5, fontWeight: 800, marginTop: 5, color: i === stage ? s.color : i < stage ? C.ink : "#C9B8BF" }}>
                  {i + 1}부 {s.name.split(" · ")[0]}{i < stage ? " ✓" : ""}
                </div>
              </div>
            ))}
          </div>

          <div className="pop" style={{ ...card }} key={`${stage}-${qIdx}`}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, flexWrap: "wrap", gap: 6 }}>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <Chip bg={st.soft} color={st.color}>{stage + 1}부 · {st.name}</Chip>
                <Chip bg="#FFF6E4" color="#B07B14">📖 {SEASON}</Chip>
              </div>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.sub }}>장면 {gIdx + 1} / 12</span>
            </div>
            <div style={{ margin: "2px 0 12px" }}>
              <div style={{ position: "relative", borderRadius: 16, overflow: "hidden", padding: "30px 0", textAlign: "center", background: `linear-gradient(135deg, ${qu.grad[0]}, ${qu.grad[1]})` }}>
                <div style={{ position: "absolute", left: -34, top: -34, width: 150, height: 150, borderRadius: "50%", background: "rgba(255,255,255,.24)" }} />
                <div style={{ position: "absolute", right: -26, bottom: -46, width: 130, height: 130, borderRadius: "50%", background: "rgba(0,0,0,.08)" }} />
                <div className="wob" style={{ fontSize: 82, lineHeight: 1, position: "relative", display: "inline-block", filter: "drop-shadow(0 6px 12px rgba(0,0,0,.16))" }}>{qu.scene}</div>
              </div>
              <div style={{ fontSize: 13.5, fontWeight: 800, color: st.color, marginTop: 10, textAlign: "center" }}>{qu.title}</div>
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.75, marginBottom: 18, whiteSpace: "pre-line" }}>{qu.text}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {orders[gIdx].map((origIdx, di) => {
                const op = qu.options[origIdx];
                const on = answers[gIdx] === origIdx;
                return (
                  <button key={op.label} onClick={() => {
                    sfx("pick"); const na = [...answers]; na[gIdx] = origIdx; setAnswers(na);
                    const np = [...posLog]; np[gIdx] = di; setPosLog(np);
                    const nt = [...sceneMs]; nt[gIdx] = Date.now() - qStart; setSceneMs(nt);
                    setTimeout(() => advance(na), 200);
                  }} style={{ textAlign: "left", padding: "13px 16px", borderRadius: 13, cursor: "pointer", fontFamily: font, fontSize: 14.5, lineHeight: 1.55, fontWeight: on ? 800 : 600, border: `1.5px solid ${on ? st.color : C.line}`, background: on ? st.soft : C.paper, color: on ? st.color : C.ink }}>
                    {op.label}
                  </button>
                );
              })}
              <button onClick={() => {
                sfx("skip"); const na = [...answers]; na[gIdx] = "skip"; setAnswers(na);
                const np = [...posLog]; np[gIdx] = null; setPosLog(np);
                const nt = [...sceneMs]; nt[gIdx] = Date.now() - qStart; setSceneMs(nt);
                setTimeout(() => advance(na), 200);
              }} style={{ textAlign: "center", padding: "10px 16px", borderRadius: 12, cursor: "pointer", fontFamily: font, fontSize: 12.5, fontWeight: 700, border: `1.5px dashed ${answers[gIdx] === "skip" ? st.color : "#DFC9CF"}`, background: answers[gIdx] === "skip" ? st.soft : "transparent", color: answers[gIdx] === "skip" ? st.color : "#AD939C" }}>
                🤔 둘 다 내 이야기가 아니에요 — 이 장면은 판단 보류
              </button>
              <div style={{ fontSize: 10.5, color: "#C4AEB6", textAlign: "center" }}>억지로 고르면 오히려 결과가 흐려져요. 보류한 장면은 점수에 반영하지 않습니다.</div>
            </div>
          </div>
          <div style={{ display: "flex", justifyContent: "flex-start", marginTop: 14 }}>
            <button disabled={qIdx === 0} onClick={() => setQIdx(qIdx - 1)}
              style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}`, opacity: qIdx === 0 ? 0.4 : 1, padding: "10px 18px", fontSize: 13.5 }}>이전 장면</button>
          </div>
        </div>
      </div>
    );
  }

  // ================= 결과 =================
  const mePayload = { n: myName, t: myType, s: scores };

  if (mode === "result" && !invite) {
    const T = TYPES[myType];
    const fitRank = typeFitRank(scores);
    const inviteLink = `${baseUrl()}#invite=${enc(mePayload)}`;
    const shareMsg = `💘 러브핏 궁합 테스트\n\n나(${myName})의 연애 유형이 나왔어!\n너도 90초 스토리 테스트하면 우리 궁합이 바로 나와 👇\n${inviteLink}`;
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 780, padding: "14px 20px 60px" }}>
          <div className="pop" style={{ borderRadius: 22, padding: "30px 26px", color: "#fff", marginBottom: 14, position: "relative", overflow: "hidden", background: "linear-gradient(135deg, #1C0F1E, #33152B)" }}>
            <div style={{ position: "absolute", right: -50, top: -50, width: 260, height: 260, borderRadius: "50%", background: "radial-gradient(circle, rgba(232,68,122,.45), transparent 65%)" }} />
            <HeartRain n={8} />
            <div style={{ position: "relative", display: "flex", gap: 22, flexWrap: "wrap", alignItems: "center" }}>
              <div className="beat" style={{ fontSize: 92, lineHeight: 1 }}>{T.emoji}</div>
              <div style={{ flex: "1 1 280px" }}>
                <div style={{ fontSize: 12.5, fontWeight: 800, color: C.gold }}>{myName}님의 연애 유형</div>
                <div style={{ fontSize: 30, fontWeight: 900, margin: "4px 0 2px" }}>{myType} <span style={{ fontSize: 17, fontWeight: 700, color: "#D9C6D6" }}>— {T.name}</span></div>
                <div style={{ fontSize: 14.5, fontStyle: "italic", color: "#FFB0CB", margin: "6px 0 10px" }}>{T.line}</div>
                <p style={{ fontSize: 13.5, color: "#D6C7D3", lineHeight: 1.7, margin: "0 0 12px" }}>{T.love}</p>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
                  {AXES.map(ax => {
                    const v = scores[ax.key];
                    const bd = axisMeta[ax.key] && axisMeta[ax.key].borderline;
                    return <Chip key={ax.key} bg={bd ? "rgba(242,180,65,.25)" : "rgba(255,255,255,.14)"} color={bd ? "#FFE0A8" : "#FFE0EC"}>{v >= 0 ? ax.pos : ax.neg} · {v >= 0 ? ax.posName : ax.negName} {bd ? "⚖️ 경계선" : `${strengthPct(v)}%`}</Chip>;
                  })}
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
                  <Chip bg="rgba(255,255,255,.14)" color="#FFE0EC">유형 일치율 1위 {fitRank[0].t} {fitRank[0].fit}%</Chip>
                  <Chip bg="rgba(255,255,255,.1)" color="#D9C6D6">2순위 후보 {TYPES[fitRank[1].t].emoji} {fitRank[1].t} {fitRank[1].fit}%</Chip>
                </div>
                <Chip bg="rgba(108,92,232,.3)" color="#CFC6FF">💜 이론상 찰떡 · {T.best.map(b => `${TYPES[b].emoji}${b}`).join("  ")}</Chip>
                {reliability && (
                  <div style={{ marginTop: 10 }}>
                    <Chip bg="rgba(255,255,255,.14)" color={reliability.level === "높음" ? "#7EDBB4" : "#FFE0A8"}>응답 신뢰도 · {reliability.level}{reliability.flags.length ? ` (${reliability.flags.join(" · ")})` : ""}</Chip>
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="pop2" style={{ ...card, textAlign: "center", padding: "28px 24px", marginBottom: 14, border: `2px dashed ${C.me}66`, background: "#FFFBFC" }}>
            <div className="beat" style={{ fontSize: 40, display: "inline-block" }}>💌</div>
            <div style={{ fontSize: 19, fontWeight: 900, margin: "8px 0 6px" }}>이제 반쪽의 이야기가 필요해요</div>
            <p style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.7, margin: "0 0 16px" }}>
              아래 버튼으로 링크를 복사해 연인에게 보내세요.<br />
              상대가 같은 사계절 이야기를 끝내는 순간, <b style={{ color: C.me }}>둘의 궁합 리포트</b>가 완성됩니다.
            </p>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              {copyBtn("invite", shareMsg, "💘 초대 메시지 복사하기 (카톡용)", C.me)}
              {copyBtn("link", inviteLink, "🔗 링크만 복사", "#3D2A3A")}
            </div>
            <div style={{ fontSize: 11, color: "#B7A6AE", marginTop: 12 }}>* 링크에는 이름과 유형 결과만 담깁니다. 개별 답변 내용은 전송되지 않습니다.</div>
          </div>

          <div className="pop3" style={{ ...card }}>
            <div style={{ fontSize: 12.5, fontWeight: 800, color: C.you, marginBottom: 12 }}>나의 4축 상세</div>
            {AXES.map(ax => <AxisCompare key={ax.key} axis={ax} a={scores[ax.key]} b={null} nameA={myName} nameB="" />)}
            {AXES.some(ax => axisMeta[ax.key].borderline) && (
              <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.7, background: "#FFF6E4", borderRadius: 10, padding: "10px 12px", marginBottom: 12 }}>
                ⚖️ <b>경계선 축 안내</b> — {AXES.filter(ax => axisMeta[ax.key].borderline).map(ax => `${ax.neg}/${ax.pos}`).join(", ")} 축은 양쪽 성향이 거의 균형이에요. 이런 축은 상황에 따라 다르게 발현되는 게 자연스러우며, 강제로 한쪽으로 분류하지 않고 아래 유형 일치율로 함께 보여드립니다.
              </div>
            )}
            <div style={{ fontSize: 12.5, fontWeight: 800, color: C.me, margin: "4px 0 10px" }}>16유형 일치율 TOP 3 <span style={{ fontWeight: 700, color: C.sub, fontSize: 11.5 }}>· 하나로 단정하지 않고 후보의 일치율을 공개합니다</span></div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
              {fitRank.slice(0, 3).map((r, i) => (
                <div key={r.t} style={{ display: "grid", gridTemplateColumns: "150px 1fr 44px", alignItems: "center", gap: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: i === 0 ? 900 : 700, color: i === 0 ? C.ink : C.sub }}>{TYPES[r.t].emoji} {r.t} <span style={{ fontSize: 10.5 }}>{TYPES[r.t].name}</span></div>
                  <div style={{ height: 9, background: "#F7EEF0", borderRadius: 99, overflow: "hidden" }}>
                    <div style={{ width: `${r.fit}%`, height: "100%", background: i === 0 ? `linear-gradient(90deg, ${C.me}, ${C.you})` : "#DCC9D0", borderRadius: 99 }} />
                  </div>
                  <div style={{ fontSize: 13, fontWeight: 900, color: i === 0 ? C.me : C.sub, textAlign: "right" }}>{r.fit}%</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 4 }}>
              <button onClick={() => { resetTest(); setMode("quiz"); }} style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}`, padding: "8px 16px", fontSize: 12.5 }}>다른 장면으로 다시 검사</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ================= 커플 결과 (초대받은 사람 완료 or 공유 링크 열람) =================
  if (mode === "result" && invite || mode === "couple") {
    const A = mode === "couple" ? coupleView.a : invite;         // 초대한 사람 (핑크)
    const B = mode === "couple" ? coupleView.b : mePayload;      // 응답한 사람 (퍼플)
    const rep = coupleReport(A.t, B.t, A.s, B.s);
    const grade = totalLabel(rep.total);
    const coupleLink = `${baseUrl()}#couple=${enc({ a: { n: A.n, t: A.t, s: A.s }, b: { n: B.n, t: B.t, s: B.s } })}`;
    const shareMsg = `💞 러브핏 궁합 결과\n\n${A.n}(${A.t}) ❤ ${B.n}(${B.t})\n궁합 ${rep.total}점 · ${grade.word}!\n\n전체 리포트 보기 👇\n${coupleLink}`;
    return (
      <div style={shell}>
        <style>{css}</style>
        {Header}
        <div style={{ width: "100%", maxWidth: 780, padding: "14px 20px 60px" }}>
          <div className="pop" style={{ borderRadius: 22, padding: "32px 26px", color: "#fff", marginBottom: 14, position: "relative", overflow: "hidden", background: "linear-gradient(135deg, #1C0F1E, #2A1533, #14162E)" }}>
            <div style={{ position: "absolute", right: -50, top: -60, width: 280, height: 280, borderRadius: "50%", background: "radial-gradient(circle, rgba(232,68,122,.45), transparent 65%)" }} />
            <div style={{ position: "absolute", left: -60, bottom: -70, width: 260, height: 260, borderRadius: "50%", background: "radial-gradient(circle, rgba(108,92,232,.5), transparent 65%)" }} />
            <HeartRain n={12} />
            <div style={{ position: "relative", textAlign: "center" }}>
              <div style={{ fontSize: 12.5, fontWeight: 800, color: C.gold, marginBottom: 12 }}>💞 우리의 궁합 리포트{rep.golden ? " · ✨ 이론상 천생연분 조합" : ""}{rep.bAxes && rep.bAxes.length ? ` · ⚖️ 경계선 축 ${rep.bAxes.length}개` : ""}</div>
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: "clamp(10px, 4vw, 28px)", flexWrap: "wrap" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 62, lineHeight: 1 }}>{TYPES[A.t].emoji}</div>
                  <div style={{ fontSize: 16, fontWeight: 900, marginTop: 6 }}>{A.n}</div>
                  <div style={{ fontSize: 12.5, fontWeight: 800, color: "#FFB0CB" }}>{A.t} · {TYPES[A.t].name}</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div className="beat" style={{ fontSize: 34, display: "inline-block" }}>❤️</div>
                  <div style={{ fontSize: "clamp(46px, 9vw, 64px)", fontWeight: 900, lineHeight: 1, background: "linear-gradient(90deg, #FF8FB1, #CFC6FF)", WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>
                    <CountUp to={rep.total} onDone={() => sfx("check")} />
                  </div>
                  <div className="reveal-late" style={{ fontSize: 14, fontWeight: 900, color: "#FFE0EC", marginTop: 2 }}>{grade.g}등급 · {grade.word}</div>
                  <div className="reveal-late" style={{ fontSize: 11.5, color: "#B9A6B6", marginTop: 2 }}>{grade.desc}</div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 62, lineHeight: 1 }}>{TYPES[B.t].emoji}</div>
                  <div style={{ fontSize: 16, fontWeight: 900, marginTop: 6 }}>{B.n}</div>
                  <div style={{ fontSize: 12.5, fontWeight: 800, color: "#CFC6FF" }}>{B.t} · {TYPES[B.t].name}</div>
                </div>
              </div>
            </div>
          </div>

          <div className="pop2" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 14 }}>
            <TypeCard name={A.n} type={A.t} scores={A.s} accent={C.me} soft={C.meSoft} roleLabel="💗 먼저 검사한 사람" />
            <TypeCard name={B.n} type={B.t} scores={B.s} accent={C.you} soft={C.youSoft} roleLabel="💜 초대받은 사람" />
          </div>

          <div className="pop2" style={{ ...card, marginBottom: 14 }}>
            <div style={{ fontSize: 12.5, fontWeight: 800, color: C.me, marginBottom: 14 }}>4축 겹쳐보기 <span style={{ fontWeight: 700, color: C.sub }}>· <span style={{ color: C.me }}>●</span> {A.n} <span style={{ color: C.you }}>●</span> {B.n}</span></div>
            {AXES.map(ax => <AxisCompare key={ax.key} axis={ax} a={(A.s || {})[ax.key] ?? ((A.t.includes(ax.pos) ? 20 : -20))} b={(B.s || {})[ax.key] ?? ((B.t.includes(ax.pos) ? 20 : -20))} nameA={A.n} nameB={B.n} />)}
            <div style={{ fontSize: 11, color: "#B7A6AE" }}>* 점이 가까울수록 같은 성향, 멀수록 보완 관계입니다. 같음도 다름도 각각의 강점이 있어요.</div>
          </div>

          <div className="pop3" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 12, marginBottom: 14 }}>
            {rep.cats.map(cat => (
              <div key={cat.name} style={{ ...card, padding: 18 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontSize: 14.5, fontWeight: 900 }}>{cat.icon} {cat.name}</span>
                  <span style={{ fontSize: 15, fontWeight: 900, color: scoreColor(cat.score / cat.max * 100) }}>{cat.score}<span style={{ fontSize: 11.5, color: "#C9B8BF" }}> / {cat.max}</span></span>
                </div>
                <div style={{ height: 7, background: "#F7EEF0", borderRadius: 99, overflow: "hidden", marginBottom: 10 }}>
                  <div style={{ width: `${(cat.score / cat.max) * 100}%`, height: "100%", background: `linear-gradient(90deg, ${C.me}, ${C.you})`, borderRadius: 99 }} />
                </div>
                <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.7 }}>{cat.text}</div>
              </div>
            ))}
          </div>

          <PrescriptionList tips={rep.tips} coupleKey={encodeURIComponent(`${A.t}_${A.n}_${B.t}_${B.n}`)} />

          <div className="pop3" style={{ ...card, textAlign: "center" }}>
            <div style={{ fontSize: 15, fontWeight: 900, marginBottom: 12 }}>이 결과, 함께 봐야 진짜죠</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
              {copyBtn("couple", shareMsg, "💞 결과 메시지 복사하기 (카톡용)", C.me)}
              {copyBtn("clink", coupleLink, "🔗 결과 링크만 복사", "#3D2A3A")}
              <button onClick={() => { location.hash = ""; setInvite(null); setCoupleView(null); startTest(); }} style={{ ...btn("transparent", C.sub), border: `1px solid ${C.line}` }}>나도 처음부터 해보기</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<LoveFit />);
</script>
</body>
</html>
